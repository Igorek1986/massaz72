services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  app:
    build:
      dockerfile: ./Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./massaz72/media:/app/media
      - ./massaz72/logs:/app/logs
      - ./massaz72/staticfiles:/app/staticfiles
    restart: always
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-file: "10"
        max-size: "200k"

volumes:
  postgres_data:
