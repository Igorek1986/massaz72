services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  app:
    build:
      dockerfile: ./Dockerfile
    image: massaz72_django-app
    ports:
      - "8000:8000"
    volumes:
      - ./massaz72/media:/app/media
      - ./massaz72/logs:/app/logs
      - ./massaz72/staticfiles:/app/staticfiles
    restart: always
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-file: "10"
        max-size: "200k"

  # Telegram-бот. Режим определяется переменной BOT_MODE в .env:
  #   BOT_MODE=polling  — запускает long polling (нужен, если webhook недоступен)
  #   BOT_MODE=webhook  — сервис сразу завершается; обновления принимает app через URL
  # После изменения BOT_MODE пересоздать контейнер: docker compose up -d bot
  bot:
    build:
      dockerfile: ./Dockerfile
    image: massaz72_django-app
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        if [ "$BOT_MODE" = "polling" ]; then
          exec python manage.py runbot
        else
          echo "BOT_MODE=${BOT_MODE}, polling не запущен."
        fi
    restart: on-failure
    env_file:
      - .env
    volumes:
      - ./massaz72/logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      app:
        condition: service_started
    logging:
      driver: "json-file"
      options:
        max-file: "10"
        max-size: "200k"

volumes:
  postgres_data:
