{% extends "cabinet/base.html" %}
{% load static %}

{% block title %}Расписание{% endblock %}
{% block nav_calendar %}sidebar__link--active{% endblock %}

{% block head_extra %}{% endblock %}

{% block content %}
<div class="page-header">
  <h1 class="page-header__title">Расписание</h1>
</div>

<div class="schedule-layout">
  <div class="calendar-wrap">
    <div id="calendar"></div>
  </div>
  <div class="day-panel-wrap">
    <div id="day-panel"
         hx-get="{% url 'cabinet:day_schedule' today %}"
         hx-trigger="load"
         hx-swap="innerHTML">
      <div class="day-panel-loading">Загрузка...</div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{% static 'cabinet/js/fullcalendar.min.js' %}"></script>
<script src="{% static 'cabinet/js/fullcalendar-ru.min.js' %}"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
  const calendarEl = document.getElementById('calendar');
  const eventsUrl = '{% url "cabinet:calendar_events" %}';
  const dayUrl = '{% url "cabinet:day_schedule" "DATE" %}';

  function selectDay(dateStr, dayEl) {
    const url = dayUrl.replace('DATE', dateStr);
    htmx.ajax('GET', url, { target: '#day-panel', swap: 'innerHTML' });
    calendarEl.querySelectorAll('.fc-day-selected').forEach(function(el) {
      el.classList.remove('fc-day-selected');
    });
    if (dayEl) dayEl.classList.add('fc-day-selected');
  }

  let initialized = false;

  const calendar = new FullCalendar.Calendar(calendarEl, {
    locale: 'ru',
    titleFormat: { year: 'numeric', month: 'long' },
    initialView: 'dayGridMonth',
    firstDay: 1,
    height: 'auto',
    customButtons: {
      gotoToday: {
        text: 'Сегодня',
        click: function() {
          calendar.today();
          const todayStr = new Date().toISOString().slice(0, 10);
          setTimeout(function() {
            const dayEl = calendarEl.querySelector('[data-date="' + todayStr + '"]');
            selectDay(todayStr, dayEl);
          }, 50);
        }
      }
    },
    headerToolbar: {
      left: 'prev,next gotoToday',
      center: 'title',
      right: ''
    },
    events: eventsUrl,
    dateClick: function(info) {
      selectDay(info.dateStr, info.dayEl);
    },
    eventClick: function(info) {
      info.jsEvent.preventDefault();
      const dateStr = info.event.startStr.slice(0, 10);
      const dayEl = calendarEl.querySelector('[data-date="' + dateStr + '"]');
      selectDay(dateStr, dayEl);
    },
  });

  calendar.render();

  // Перезагрузка событий после изменения записи
  document.body.addEventListener('appointmentChanged', function() {
    calendar.refetchEvents();
  });
});
</script>
{% endblock %}
